spring:
  datasource:
    url: jdbc:postgresql://db:5432/tasktimetracker_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/task-time-tracker
          jwk-set-uri: http://keycloak:8080/realms/task-time-tracker/protocol/openid-connect/certs

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true